# Blog Material You — Public Blog (Port 30999) — Docker
# SPA frontend + public API + SSR endpoints
server {
    listen       30999;
    server_name  localhost;
    charset      utf-8;

    # Frontend root (static assets; pages are server-rendered via Lua/etlua)
    root  /app/blog/public;

    # Static assets with caching
    location ~* \.(css|js|svg|png|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ==================== PUBLIC API ====================
    location = /api/health {
        default_type application/json;
        return 200 '{"status":"ok","server":"openresty","version":"blog-material-you-backend"}';
    }

    location = /api/config {
        content_by_lua_file lua/api/config.lua;
    }

    location = /api/posts {
        content_by_lua_file lua/api/posts.lua;
    }

    location ~ ^/api/posts/([^/]+)$ {
        set $post_slug $1;
        content_by_lua_file lua/api/post.lua;
    }

    location = /api/tags {
        content_by_lua_file lua/api/tags.lua;
    }

    location ~ ^/api/tags/([^/]+)$ {
        set $tag_name $1;
        content_by_lua_file lua/api/tag.lua;
    }

    location = /api/categories {
        content_by_lua_file lua/api/categories.lua;
    }

    location ~ ^/api/categories/([^/]+)$ {
        set $category_name $1;
        content_by_lua_file lua/api/category.lua;
    }

    location = /api/archives {
        content_by_lua_file lua/api/archives.lua;
    }

    location ~ ^/api/pages/([^/]+)$ {
        set $page_slug $1;
        content_by_lua_file lua/api/page.lua;
    }

    location = /api/comments {
        content_by_lua_file lua/api/comments.lua;
    }

    location = /api/talks {
        content_by_lua_file lua/api/talks.lua;
    }

    location = /api/friends {
        content_by_lua_file lua/api/friends.lua;
    }

    location = /api/status {
        content_by_lua_file lua/api/status.lua;
    }

    location = /api/auth/check {
        content_by_lua_file lua/api/auth/check.lua;
    }

    location = /api/auth/register {
        content_by_lua_file lua/api/auth/register.lua;
    }

    location = /api/calendar {
        content_by_lua_file lua/api/calendar.lua;
    }

    location = /api/upload-avatar {
        client_max_body_size 10m;
        content_by_lua_file lua/api/upload_avatar.lua;
    }

    # Avatars directory (no cache for fresh uploads)
    location /avatars/ {
        add_header Cache-Control "public, max-age=3600";
    }

    # ==================== SSR ENDPOINTS ====================
    # Server-side rendered HTML fragments for SPA
    location ~ ^/api/ssr(/|$) {
        content_by_lua_file lua/api/ssr.lua;
    }

    # ==================== SPA FALLBACK ====================
    # Redirect /admin/* to port 31000 (admin backend)
    location /admin {
        return 302 http://localhost:31000/;
    }

    # ==================== SSR FALLBACK ====================
    # Server-rendered SPA shell (templates/pages/shell.etlua)
    location @ssr {
        content_by_lua_file lua/serve.lua;
    }

    # Root must be Lua-rendered (try_files would match the directory)
    location = / {
        content_by_lua_file lua/serve.lua;
    }

    location / {
        try_files $uri @ssr;
    }
}
