# Blog Material You — Docker nginx.conf
# All paths are relative to the server prefix (-p "$SCRIPT_DIR").

worker_processes 1;
error_log logs/error.log notice;
pid       nginx.pid;
env BMY_SESSION_SECRET;

events {
    worker_connections 1024;
}

http {
    client_body_temp_path tmp/body;
    proxy_temp_path       tmp/proxy;
    fastcgi_temp_path     tmp/fastcgi;
    uwsgi_temp_path       tmp/uwsgi;
    scgi_temp_path        tmp/scgi;

    lua_package_path "/app/backend/lua/?.lua;/app/backend/lua/lib/?.lua;/usr/lib/nginx/lualib/?.lua;;";

    init_by_lua_block {
        package.path = "/app/backend/lua/?.lua;" .. "/app/backend/lua/lib/?.lua;" .. package.path
    }

    lua_shared_dict blog_posts    2m;
    lua_shared_dict blog_pages    512k;
    lua_shared_dict blog_config   128k;
    lua_shared_dict blog_cache    1m;
    lua_shared_dict blog_sessions 1m;

    limit_req_zone $binary_remote_addr zone=admin_login:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=admin_api:10m rate=60r/m;

    init_worker_by_lua_file lua/init.lua;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: https://res.imitoy.top; connect-src 'self'; font-src 'self' https://unpkg.com;" always;

    include /app/backend/conf/sites-enabled/*.conf;
}
