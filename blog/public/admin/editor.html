<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑器 · 博客管理</title>
  <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
  <script src="https://unpkg.com/mdui@2/mdui.global.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Google Sans', sans-serif; background: #f5f5f5; min-height: 100vh; }
    .admin-layout { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: rgb(var(--mdui-color-surface)); border-right: 1px solid rgb(var(--mdui-color-outline-variant)); padding: 16px; display: flex; flex-direction: column; }
    .sidebar h2 { font-size: 20px; font-weight: 500; margin-bottom: 24px; color: rgb(var(--mdui-color-primary)); }
    .sidebar nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .sidebar nav mdui-list-item { border-radius: 8px; }
    .sidebar .logout { margin-top: auto; }
    .sidebar nav a { text-decoration: none; color: inherit; }
    .main { flex: 1; padding: 32px; overflow-y: auto; max-width: 100%; }
    .main mdui-card { margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 4px; color: rgb(var(--mdui-color-on-surface)); }
    .form-group input, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid rgb(var(--mdui-color-outline)); border-radius: 8px; font-size: 14px; font-family: inherit; background: rgb(var(--mdui-color-surface)); color: rgb(var(--mdui-color-on-surface)); }
    .form-group textarea { min-height: 300px; resize: vertical; font-family: 'Fira Code', 'Monaco', monospace; font-size: 13px; line-height: 1.5; }
    .editor-toolbar { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .editor-toolbar mdui-button-icon { --mdui-button-icon-size: 36px; }
    #toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
  </style>
</head>
<body>
  <div class="admin-layout">
    <div class="sidebar">
      <h2>📝 博客管理</h2>
      <nav>
        <a href="dashboard.html"><mdui-list-item rounded>📊 控制台</mdui-list-item></a>
        <a href="posts.html"><mdui-list-item rounded>📄 文章</mdui-list-item></a>
        <a href="comments.html"><mdui-list-item rounded>💬 评论</mdui-list-item></a>
        <a href="talks.html"><mdui-list-item rounded>💭 动态</mdui-list-item></a>
        <a href="friends.html"><mdui-list-item rounded>🔗 友链</mdui-list-item></a>
        <a href="pages.html"><mdui-list-item rounded>📑 页面</mdui-list-item></a>
        <a href="security.html"><mdui-list-item rounded>🔐 安全</mdui-list-item></a>
      </nav>
      <a href="login.html" class="logout"><mdui-list-item rounded>🚪 退出</mdui-list-item></a>
    </div>
    <div class="main" id="main-content">加载中...</div>
  </div>

  <script>
    const API = '/api/admin';
    const SSR = '/api/admin/ssr';

    function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function toast(msg) {
      const el = document.getElementById('toast') || (() => { const e = document.createElement('div'); e.id = 'toast'; document.body.appendChild(e); return e; })();
      el.innerHTML = '<mdui-snackbar>' + escapeHtml(msg) + '</mdui-snackbar>';
      const sb = el.querySelector('mdui-snackbar');
      if (sb) sb.show = true;
    }

    async function api(path, opts) {
      const headers = { 'Content-Type': 'application/json' };
      const res = await fetch(API + path, { ...opts, headers: { ...headers, ...(opts?.headers || {}) }, credentials: 'same-origin' });
      if (res.status === 401) { window.location.href = 'login.html'; throw new Error('Unauthorized'); }
      return res.json();
    }

    async function fetchSSR(path) {
      const res = await fetch(SSR + path);
      if (!res.ok) return '<p style="color:red">Failed to load: ' + res.status + '</p>';
      return res.text();
    }

    function initEditorToolbar() {
      const ta = document.getElementById('ed-content');
      if (!ta) return;
      const tb = function(id, txt) {
        document.getElementById(id)?.addEventListener('click', function() { ta.value += txt; ta.focus(); });
      };
      tb('tb-bold', '**加粗**');
      tb('tb-italic', '*斜体*');
      tb('tb-heading', '\\n## 标题\\n');
      tb('tb-list', '\\n- 列表项\\n');
      tb('tb-code', '\\n```\\n代码\\n```\\n');
      tb('tb-quote', '\\n> 引用\\n');
    }

    async function savePost() {
      const slug = document.getElementById('ed-slug').value.trim();
      const title = document.getElementById('ed-title').value.trim();
      const date = document.getElementById('ed-date').value;
      const cover = document.getElementById('ed-cover').value.trim();
      const tags = document.getElementById('ed-tags').value.split(',').map(s => s.trim()).filter(Boolean);
      const categories = document.getElementById('ed-cats').value.split(',').map(s => s.trim()).filter(Boolean);
      const content = document.getElementById('ed-content').value;
      const titleEn = document.getElementById('ed-title-en').value.trim();
      const tagsEn = document.getElementById('ed-tags-en').value.split(',').map(s => s.trim()).filter(Boolean);
      const catsEn = document.getElementById('ed-cats-en').value.split(',').map(s => s.trim()).filter(Boolean);
      const contentEn = document.getElementById('ed-content-en').value;

      if (!slug || !title) { toast('Slug 和标题不能为空'); return; }

      var result = await api('/posts');
      var list = result.data;
      if (!Array.isArray(list)) list = [];
      var method = list.some(function(p) { return p.slug === slug; }) ? 'PUT' : 'POST';
      const res = await api('/posts', {
        method,
        body: JSON.stringify({ slug, title, date, tags, categories, cover, content, title_en: titleEn, tags_en: tagsEn, categories_en: catsEn, content_en: contentEn })
      });
      if (res.errno === 0) { await api('/reload', { method: 'POST' }); toast('保存成功 ✓'); window.location.href = 'posts.html'; }
      else toast('保存失败: ' + (res.errmsg || ''));
    }

    function bindEvents() {
      document.querySelectorAll('[data-action]').forEach(function(el) {
        el.addEventListener('click', function(e) {
          const target = e.currentTarget;
          const action = target.dataset.action;
          if (action === 'save-post') savePost();
          else if (action === 'cancel-edit') window.location.href = 'posts.html';
        });
      });
      initEditorToolbar();
    }

    document.addEventListener('DOMContentLoaded', async function() {
      var el = document.getElementById('main-content');
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('slug');
      var path = '/editor' + (slug ? '?slug=' + encodeURIComponent(slug) : '');
      try {
        el.innerHTML = await fetchSSR(path);
        bindEvents();
      } catch(e) {
        el.innerHTML = '<p style="color:red">加载失败: ' + escapeHtml(e.message) + '</p>';
      }
    });
  </script>
</body>
</html>
