<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博客管理</title>
  <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
  <script src="https://unpkg.com/mdui@2/mdui.global.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Google Sans', sans-serif; background: #f5f5f5; min-height: 100vh; }
    .admin-layout { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: rgb(var(--mdui-color-surface)); border-right: 1px solid rgb(var(--mdui-color-outline-variant)); padding: 16px; display: flex; flex-direction: column; }
    .sidebar h2 { font-size: 20px; font-weight: 500; margin-bottom: 24px; color: rgb(var(--mdui-color-primary)); }
    .sidebar nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .sidebar nav mdui-list-item { border-radius: 8px; }
    .sidebar .logout { margin-top: auto; }
    .main { flex: 1; padding: 32px; overflow-y: auto; max-width: 100%; }
    .main mdui-card { margin-bottom: 24px; }
    .main .form-group textarea { width: 100%; min-height: 400px; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-header h1 { font-size: 28px; font-weight: 400; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card mdui-card { padding: 24px; }
    .stat-card .stat-number { font-size: 36px; font-weight: 500; color: rgb(var(--mdui-color-primary)); }
    .stat-card .stat-label { font-size: 14px; color: rgb(var(--mdui-color-outline)); margin-top: 4px; }
    .post-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid rgb(var(--mdui-color-outline-variant)); }
    .post-item:last-child { border-bottom: none; }
    .post-info h3 { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
    .post-info span { font-size: 13px; color: rgb(var(--mdui-color-outline)); }
    .post-actions { display: flex; gap: 8px; }
    .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-card { width: 400px; padding: 32px; }
    .login-card h1 { font-size: 24px; font-weight: 500; margin-bottom: 24px; text-align: center; }
    .login-card mdui-text-field { width: 100%; margin-bottom: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 4px; color: rgb(var(--mdui-color-on-surface)); }
    .form-group input, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid rgb(var(--mdui-color-outline)); border-radius: 8px; font-size: 14px; font-family: inherit; background: rgb(var(--mdui-color-surface)); color: rgb(var(--mdui-color-on-surface)); }
    .form-group textarea { min-height: 300px; resize: vertical; font-family: 'Fira Code', 'Monaco', monospace; font-size: 13px; line-height: 1.5; }
    .tag-input { display: flex; flex-wrap: wrap; gap: 4px; padding: 8px; border: 1px solid rgb(var(--mdui-color-outline)); border-radius: 8px; min-height: 42px; }
    .tag-input input { border: none; outline: none; flex: 1; min-width: 80px; font-size: 14px; background: transparent; color: rgb(var(--mdui-color-on-surface)); }
    .tag-input .tag { display: inline-flex; align-items: center; gap: 4px; background: rgb(var(--mdui-color-secondary-container)); color: rgb(var(--mdui-color-on-secondary-container)); padding: 2px 8px; border-radius: 12px; font-size: 13px; }
    .tag-input .tag .remove { cursor: pointer; font-size: 16px; line-height: 1; }
    .hidden { display: none !important; }
    .comment-item { padding: 12px 0; border-bottom: 1px solid rgb(var(--mdui-color-outline-variant)); font-size: 14px; display: flex; justify-content: space-between; align-items: flex-start; }
    .comment-item .comment-info { flex: 1; }
    .comment-item .comment-text { margin: 4px 0; }
    .comment-item .comment-meta { font-size: 12px; color: rgb(var(--mdui-color-outline)); }
    .editor-toolbar { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .editor-toolbar mdui-button-icon { --mdui-button-icon-size: 36px; }
    #toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const API = '/api/admin';
    let authToken = null;
    let currentView = 'dashboard';

    // ===== Utils =====
    function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function toast(msg) {
      const el = document.getElementById('toast') || (() => { const e = document.createElement('div'); e.id = 'toast'; document.body.appendChild(e); return e; })();
      el.innerHTML = '<mdui-snackbar>' + escapeHtml(msg) + '</mdui-snackbar>';
      const sb = el.querySelector('mdui-snackbar');
      if (sb) sb.show = true;
    }

    async function api(path, opts) {
      const headers = { 'Content-Type': 'application/json' };
      const res = await fetch(API + path, { ...opts, headers: { ...headers, ...(opts?.headers || {}) }, credentials: 'same-origin' });
      if (res.status === 401) { authToken = null; render(); throw new Error('Unauthorized'); }
      return res.json();
    }

    function formatDate(d) {
      if (!d) return '';
      const dt = new Date(typeof d === 'string' && d.includes('-') ? d : Number(d) * 1000);
      return dt.toISOString().slice(0, 10);
    }

    // ===== Auth (Password + optional TOTP 2FA) =====
    let loginStep = 1;
    let loginTempToken = null;

    function resetLogin() {
      loginStep = 1;
      loginTempToken = null;
      render();
    }

    async function doLogin(username, password) {
      var errEl = document.getElementById('login-error');
      if (!username || !password) {
        if (errEl) { errEl.textContent = '请输入用户名和密码'; errEl.style.display = ''; }
        return;
      }
      if (errEl) errEl.style.display = 'none';
      const res = await fetch(API + '/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      var data;
      try { data = await res.json(); } catch(e) { data = { errno: -1, errmsg: '服务器返回格式错误' }; }
      if (data.errno !== 0) {
        if (errEl) { errEl.textContent = data.errmsg || '登录失败'; errEl.style.display = ''; }
        else toast('登录失败：' + (data.errmsg || '未知错误'));
        return;
      }
      if (data.data && data.data.step === 2) {
        loginStep = 2;
        loginTempToken = data.data.temp_token;
        render();
        return;
      }
      if (data.data && data.data.token) {
        authToken = data.data.token;
        loginStep = 1;
        loginTempToken = null;
        render();
      }
    }

    async function doTotpLogin(totpCode) {
      const res = await fetch(API + '/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ step: 2, temp_token: loginTempToken, totp: totpCode })
      });
      const data = await res.json();
      if (data.errno === 0 && data.data) {
        authToken = data.data.token;
        loginStep = 1;
        loginTempToken = null;
        toast('登录成功 ✓');
        render();
      } else {
        toast('验证失败：' + (data.errmsg || '验证码错误'));
      }
    }

    function logout() {
      authToken = null;
      fetch(API + '/logout', { method: 'POST', credentials: 'same-origin' }).catch(function(){});
      render();
    }

    // ===== Views =====
    function render() {
      const app = document.getElementById('app');
      if (!authToken) {
        // Token not in memory — try cookie auth via a protected endpoint first
        var checkAuth = function() {
          fetch(API + '/posts', { credentials: 'same-origin' }).then(function(r) {
            if (r.ok) {
              // Cookie-authenticated
              authToken = 'cookie';
              app.innerHTML = layoutPage();
              document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', function(e) {
                  e.preventDefault();
                  currentView = this.dataset.view;
                  renderContent();
                  document.querySelectorAll('.nav-item').forEach(n => n.active = false);
                  this.active = true;
                }, true);
              });
              document.getElementById('logout-btn')?.addEventListener('click', logout, true);
              renderContent();
              return;
            }
            // Not authenticated — check if setup is needed
            fetch(API + '/setup').then(function(r2) { return r2.json(); }).then(function(d) {
              if (d.errno === 0 && d.data && !d.data.setup_done) {
                app.innerHTML = setupPage();
                bindSetupEvents();
              } else {
                app.innerHTML = loginPage();
                bindLoginEvents();
              }
            }).catch(function() {
              app.innerHTML = loginPage();
              bindLoginEvents();
            });
          }).catch(function() {
            app.innerHTML = loginPage();
            bindLoginEvents();
          });
        };
        checkAuth();
        return;
      }
      app.innerHTML = layoutPage();
      document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', function(e) {
          e.preventDefault();
          currentView = this.dataset.view;
          renderContent();
          document.querySelectorAll('.nav-item').forEach(n => n.active = false);
          this.active = true;
        }, true);
      });
      document.getElementById('logout-btn')?.addEventListener('click', logout, true);
      renderContent();
    }

    // ===== Login =====
    var setupState = { user: '', error: '' };

    function setupPage() {
      return `
        <div class="login-container">
          <mdui-card variant="elevated" class="login-card">
            <h1>初始化管理员</h1>
            <p style="text-align:center;margin-bottom:16px;color:rgb(var(--mdui-color-outline))">请设置管理员用户名和密码</p>
            <mdui-text-field id="su-user" label="用户名" variant="outlined"></mdui-text-field>
            <mdui-text-field id="su-pass" label="密码" variant="outlined" type="password"></mdui-text-field>
            <mdui-text-field id="su-pass2" label="确认密码" variant="outlined" type="password"></mdui-text-field>
            <p id="setup-error" style="color:rgb(var(--mdui-color-error));font-size:13px;margin:8px 0;display:none"></p>
            <p id="setup-warning" style="color:rgb(var(--mdui-color-tertiary));font-size:13px;margin:8px 0;display:none"></p>
            <mdui-button data-action="setup-init" variant="filled" style="width:100%">初始化</mdui-button>
          </mdui-card>
        </div>`;
    }

    function bindSetupEvents() {
      // Handled by data-action="setup-init" in bindEventListeners (capture phase)
      bindEventListeners();
    }

    function loginPage() {
      if (loginStep === 2) {
        return `
          <div class="login-container">
            <mdui-card variant="elevated" class="login-card">
              <h1>博客管理后台</h1>
              <p style="text-align:center;margin-bottom:16px;color:rgb(var(--mdui-color-outline))">请输入身份验证器中的6位动态验证码</p>
              <form id="login-form-totp">
                <mdui-text-field id="lf-totp" label="验证码" variant="outlined" maxlength="6" pattern="[0-9]*" inputmode="numeric"></mdui-text-field>
                <mdui-button variant="filled" type="submit" style="width:100%">验证</mdui-button>
              </form>
              <mdui-button variant="text" onclick="resetLogin()" style="width:100%;margin-top:8px">返回上一步</mdui-button>
            </mdui-card>
          </div>`;
      }
      return `
        <div class="login-container">
          <mdui-card variant="elevated" class="login-card">
            <h1>博客管理后台</h1>
            <mdui-text-field id="lf-user" label="用户名" variant="outlined"></mdui-text-field>
            <mdui-text-field id="lf-pass" label="密码" variant="outlined" type="password"></mdui-text-field>
            <p id="login-error" style="color:rgb(var(--mdui-color-error));font-size:13px;margin:8px 0;display:none"></p>
            <mdui-button data-action="login" variant="filled" style="width:100%">登录</mdui-button>
          </mdui-card>
        </div>`;
    }

    function bindLoginEvents() {
      if (loginStep === 2) {
        const form = document.getElementById('login-form-totp');
        if (form) {
          form.addEventListener('submit', function(e) {
            e.preventDefault();
            const totp = document.getElementById('lf-totp')?.value || '';
            if (!totp || totp.length !== 6) { toast('请输入6位验证码'); return; }
            doTotpLogin(totp);
          });
          const input = document.getElementById('lf-totp');
          if (input) {
            input.addEventListener('input', function(e) {
              if (e.target.value.length === 6) doTotpLogin(e.target.value);
            });
          }
        }
        return;
      }
      // Step 1 login: handled by data-action="login" in bindEventListeners (capture phase)
      bindEventListeners();
    }

    function layoutPage() {
      return `
        <div class="admin-layout">
          <div class="sidebar">
            <h2>📝 管理</h2>
            <nav>
              <mdui-list-item class="nav-item" data-view="dashboard" active rounded>📊 概览</mdui-list-item>
              <mdui-list-item class="nav-item" data-view="posts" rounded>📄 文章</mdui-list-item>
              <mdui-list-item class="nav-item" data-view="comments" rounded>💬 评论</mdui-list-item>
              <mdui-list-item class="nav-item" data-view="talks" rounded>💭 动态</mdui-list-item>
              <mdui-list-item class="nav-item" data-view="friends" rounded>🔗 友链</mdui-list-item>
              <mdui-list-item class="nav-item" data-view="pages" rounded>📑 页面</mdui-list-item>
              <mdui-list-item class="nav-item" data-view="security" rounded>🔐 安全</mdui-list-item>
            </nav>
            <mdui-list-item class="logout" id="logout-btn" rounded>🚪 退出</mdui-list-item>
          </div>
          <div class="main" id="main-content">加载中...</div>
        </div>`;
    }

    async function renderContent() {
      const el = document.getElementById('main-content');
      el.innerHTML = '加载中...';
      try {
        if (currentView === 'dashboard') el.innerHTML = await dashboardView();
        else if (currentView === 'posts') el.innerHTML = await postsView();
        else if (currentView === 'comments') el.innerHTML = await commentsView();
        else if (currentView === 'talks') el.innerHTML = await talksView();
        else if (currentView === 'friends') el.innerHTML = await friendsView();
        else if (currentView === 'pages') el.innerHTML = await pagesView();
        else if (currentView === 'security') el.innerHTML = await securityView();
        bindEventListeners();
      } catch(e) {
        el.innerHTML = '<p style="color:red">加载失败: ' + escapeHtml(e.message) + '</p>';
      }
    }

    function bindEventListeners() {
      document.querySelectorAll('[data-action]').forEach(el => {
        el.addEventListener('click', function(e) {
          const target = e.currentTarget;
          const action = target.dataset.action;
          const args = target.dataset.args;
          if (action === 'edit-post') editPost(args);
          else if (action === 'delete-post') deletePost(args);
          else if (action === 'delete-comment') deleteComment(args);
          else if (action === 'delete-talk') deleteTalk(args);
          else if (action === 'new-post') newPost();
          else if (action === 'new-talk') newTalk();
          else if (action === 'toggle-archive') toggleArchive(args);
          else if (action === 'edit-page') editPage(args);
          else if (action === 'delete-friend') deleteFriend(args);
          else if (action === 'new-friend') newFriend();
          else if (action === 'save-friend') saveFriend();
          else if (action === 'edit-friend') editFriend(args);
          else if (action === 'save-post') savePost();
          else if (action === 'save-page') savePage();
          else if (action === 'cancel-edit') renderContent();
          else if (action === 'totp-start') startTotpSetup();
          else if (action === 'totp-verify') verifyTotpSetup();
          else if (action === 'totp-cancel') cancelTotpSetup();
          else if (action === 'totp-disable') disableTotp();
          else if (action === 'change-password') changePassword();
          else if (action === 'login') doLogin(
            document.getElementById('lf-user')?.value || '',
            document.getElementById('lf-pass')?.value || ''
          );
          else if (action === 'setup-init') doSetupInit();
        }, true);
      });
    }

    // ===== Dashboard =====
    async function dashboardView() {
      const [posts, comments] = await Promise.all([api('/posts'), api('/comments')]);
      const postCount = Array.isArray(posts) ? posts.length : 0;
      const commentCount = Array.isArray(comments) ? comments.length : 0;
      const tagSet = new Set();
      if (Array.isArray(posts)) posts.forEach(p => { if (p.tags) p.tags.forEach(t => tagSet.add(t)); });
      return `
        <div class="page-header"><h1>概览</h1></div>
        <div class="card-grid">
          <div class="stat-card"><mdui-card variant="elevated"><div class="stat-number">${postCount}</div><div class="stat-label">文章</div></mdui-card></div>
          <div class="stat-card"><mdui-card variant="elevated"><div class="stat-number">${commentCount}</div><div class="stat-label">评论</div></mdui-card></div>
          <div class="stat-card"><mdui-card variant="elevated"><div class="stat-number">${tagSet.size}</div><div class="stat-label">标签</div></mdui-card></div>
        </div>
        <mdui-card variant="elevated" style="padding:24px">
          <h2 style="font-size:18px;font-weight:500;margin-bottom:16px">最近文章</h2>
          ${Array.isArray(posts) && posts.length > 0 ? posts.slice(0, 5).map(p => `
            <div class="post-item">
              <div class="post-info"><h3>${escapeHtml(p.title)}</h3><span>${formatDate(p.date)}</span></div>
              <div class="post-actions">
                <mdui-button data-action="edit-post" data-args="${p.slug}" variant="text">编辑</mdui-button>
              </div>
            </div>`).join('') : '<p style="color:var(--mdui-color-outline)">还没有文章</p>'}
        </mdui-card>`;
    }

    // ===== Security View (TOTP 2FA + change password) =====
    let totpState = {};

    async function securityView() {
      const [totpRes, setupRes] = await Promise.all([
        api('/totp-setup'),
        api('/setup')
      ]);
      if (totpRes.errno !== 0 || !totpRes.data) {
        return '<p style="color:red">无法获取安全设置</p>';
      }
      const d = totpRes.data;
      d.user = (setupRes.errno === 0 && setupRes.data) ? setupRes.data.user : '';
      totpState = d;
      if (d.enabled) return renderTotpEnabled(d);
      if (d.has_pending) return renderTotpVerify(d);
      return renderTotpDisabled();
    }

    function renderTotpDisabled() {
      return `
        <div class="page-header"><h1>🔐 安全设置</h1></div>
        <mdui-card variant="elevated" style="padding:24px">
          <h2 style="font-size:18px;font-weight:500;margin-bottom:16px">两步验证 (TOTP / 2FA)</h2>
          <p style="margin-bottom:16px;color:rgb(var(--mdui-color-outline))">
            状态：<span style="color:rgb(var(--mdui-color-outline))">🔴 未启用</span>
          </p>
          <p style="margin-bottom:16px;color:rgb(var(--mdui-color-outline))">
            启用两步验证后，登录时需要同时输入密码和身份验证器应用中的6位动态验证码。
          </p>
          <mdui-button data-action="totp-start" variant="filled">启用两步验证</mdui-button>
        </mdui-card>`;
    }

    function renderTotpVerify(d) {
      return `
        <div class="page-header"><h1>🔐 安全设置</h1></div>
        <mdui-card variant="elevated" style="padding:24px">
          <h2 style="font-size:18px;font-weight:500;margin-bottom:16px">验证绑定</h2>
          <p style="margin-bottom:16px;color:rgb(var(--mdui-color-outline))">
            请使用 Google Authenticator、Authy、1Password 等应用扫描下方二维码，
            然后输入应用生成的6位验证码以完成绑定。
          </p>
          <div style="text-align:center;margin-bottom:16px">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(d.provisioning_uri)}"
                 alt="TOTP QR Code" style="width:200px;height:200px;border-radius:8px">
          </div>
          <div class="form-group">
            <label>或手动输入密钥 (Secret)</label>
            <input id="totp-secret" value="${escapeHtml(d.secret)}" readonly>
            <mdui-button variant="text" onclick="navigator.clipboard.writeText(document.getElementById('totp-secret').value).then(()=>toast('已复制'))" style="margin-top:8px">📋 复制密钥</mdui-button>
          </div>
          <div class="form-group">
            <label>验证码</label>
            <input id="totp-verify-code" placeholder="输入6位验证码" maxlength="6" style="font-size:18px;letter-spacing:4px;text-align:center;width:200px">
          </div>
          <div style="display:flex;gap:8px;margin-top:16px">
            <mdui-button data-action="totp-verify" variant="filled">验证并启用</mdui-button>
            <mdui-button data-action="totp-cancel" variant="text">取消</mdui-button>
          </div>
        </mdui-card>`;
    }

    function renderTotpEnabled(d) {
      return `
        <div class="page-header"><h1>🔐 安全设置</h1></div>
        <mdui-card variant="elevated" style="padding:24px">
          <h2 style="font-size:18px;font-weight:500;margin-bottom:16px">两步验证 (TOTP / 2FA)</h2>
          <p style="margin-bottom:16px">
            状态：<span style="color:rgb(var(--mdui-color-tertiary))">🟢 已启用</span>
          </p>
          <div style="text-align:center;margin-bottom:16px">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(d.provisioning_uri)}"
                 alt="TOTP QR Code" style="width:200px;height:200px;border-radius:8px">
          </div>
          <div class="form-group">
            <label>密钥 (Secret)</label>
            <input id="totp-secret" value="${escapeHtml(d.secret)}" readonly>
            <mdui-button variant="text" onclick="navigator.clipboard.writeText(document.getElementById('totp-secret').value).then(()=>toast('已复制'))" style="margin-top:8px">📋 复制密钥</mdui-button>
          </div>
          <p style="font-size:13px;color:rgb(var(--mdui-color-error));margin-top:16px">
            ⚠️ 如果更换设备，请先保存密钥再禁用，否则将无法登录！
          </p>

    async function changePassword() {
      var oldPass = document.getElementById('cp-old')?.value;
      var newUser = document.getElementById('cp-user')?.value?.trim();
      var newPass = document.getElementById('cp-new')?.value;
      var newPass2 = document.getElementById('cp-new2')?.value;
      var errEl = document.getElementById('cp-error');
      if (!oldPass) { errEl.textContent = '请输入当前密码'; return; }
      if (!newPass) { errEl.textContent = '请输入新密码'; return; }
      if (newPass.length < 6) { errEl.textContent = '新密码长度不少于6位'; return; }
      if (newPass !== newPass2) { errEl.textContent = '两次密码输入不一致'; return; }
      errEl.textContent = '保存中...';
      const res = await api('/setup', {
        method: 'POST',
        body: JSON.stringify({ action: 'change', old_password: oldPass, new_password: newPass, new_user: newUser })
      });
      if (res.errno === 0) {
        toast('✅ 密码已更改');
        renderContent();
      } else {
        errEl.textContent = res.errmsg || '更改失败';
      }
    }

    async function doSetupInit() {
      var user = document.getElementById('su-user')?.value?.trim();
      var pass = document.getElementById('su-pass')?.value;
      var pass2 = document.getElementById('su-pass2')?.value;
      var errEl = document.getElementById('setup-error');
      if (!user || !pass) { errEl.textContent = '用户名和密码不能为空'; errEl.style.display = ''; return; }
      if (pass.length < 6) { errEl.textContent = '密码长度不少于6位'; errEl.style.display = ''; return; }
      if (pass !== pass2) { errEl.textContent = '两次密码输入不一致'; errEl.style.display = ''; return; }
      errEl.style.display = 'none';
      try {
        var res = await fetch(API + '/setup', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'init', user: user, password: pass })
        });
        var d = await res.json();
        if (d.errno === 0) {
          // Show security warning about changing default password
          var warnEl = document.getElementById('setup-warning');
          if (warnEl) {
            warnEl.style.display = '';
            warnEl.textContent = '⚠️ 初始化成功！建议立即修改密码。';
          }
          setTimeout(function() { render(); }, 2000);
        } else {
          errEl.textContent = d.errmsg || '初始化失败';
          errEl.style.display = '';
        }
      } catch(e) {
        errEl.textContent = '网络错误: ' + e.message;
        errEl.style.display = '';
      }
    }

              <mdui-button data-action="edit-page" data-args="${p.slug}" variant="text">编辑</mdui-button>
            </div>
          </mdui-card>`).join('') : '<p>暂无页面</p>'}
        </div>`;
    }

    function editPage(slug) {
      api('/pages').then(pages => {
        const page = pages.find(p => p.slug === slug);
        const el = document.getElementById('main-content');
        el.innerHTML = `
          <div class="page-header"><h1>编辑页面: ${escapeHtml(slug)}</h1></div>
          <mdui-card variant="elevated" style="padding:24px">
            <div class="form-group"><label>Slug</label><input id="ed-slug" value="${escapeHtml(page?.slug || slug)}" disabled></div>
            <div class="form-group"><label>标题</label><input id="ed-title" value="${escapeHtml(page?.title || '')}"></div>
            <div class="form-group"><label>正文 (Markdown)</label><textarea id="ed-content">${escapeHtml(page?.content || '')}</textarea></div>
            <hr style="margin:16px 0;border-color:rgb(var(--mdui-color-outline-variant))">
            <h3 style="font-size:16px;font-weight:500;margin-bottom:12px;color:rgb(var(--mdui-color-primary))">🌐 英文内容</h3>
            <div class="form-group"><label>英文标题</label><input id="ed-title-en" value="${escapeHtml(page?.title_en || '')}" placeholder="English Title"></div>
            <div class="form-group"><label>英文正文</label><textarea id="ed-content-en">${escapeHtml(page?.content_en || '')}</textarea></div>
            <hr style="margin:16px 0;border-color:rgb(var(--mdui-color-outline-variant))">
            <div style="display:flex;gap:8px;margin-top:16px">
              <mdui-button data-action="save-page" variant="filled">保存</mdui-button>
              <mdui-button data-action="cancel-edit" variant="text">取消</mdui-button>
            </div>
          </mdui-card>`;
        bindEventListeners();
      });
    }

    async function savePage() {
      const slug = document.getElementById('ed-slug').value.trim();
      const title = document.getElementById('ed-title').value.trim();
      const content = document.getElementById('ed-content').value;
      const titleEn = document.getElementById('ed-title-en')?.value?.trim() || '';
      const contentEn = document.getElementById('ed-content-en')?.value || '';
      const res = await api('/pages', {
        method: 'PUT',
        body: JSON.stringify({ slug, title, content, title_en: titleEn, content_en: contentEn })
      });
      if (res.errno === 0) { await api('/reload', { method: 'POST' }); toast('页面已保存 ✓'); renderContent(); }
      else toast('保存失败');
    }

    // ===== Init =====
    render();
  </script>
</body>
</html>
