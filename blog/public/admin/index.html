<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博客管理</title>
  <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
  <script src="https://unpkg.com/mdui@2/mdui.global.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Google Sans', sans-serif; background: #f5f5f5; min-height: 100vh; }
    .admin-layout { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: rgb(var(--mdui-color-surface)); border-right: 1px solid rgb(var(--mdui-color-outline-variant)); padding: 16px; display: flex; flex-direction: column; }
    .sidebar h2 { font-size: 20px; font-weight: 500; margin-bottom: 24px; color: rgb(var(--mdui-color-primary)); }
    .sidebar nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .sidebar nav mdui-list-item { border-radius: 8px; }
    .sidebar .logout { margin-top: auto; }
    .main { flex: 1; padding: 32px; overflow-y: auto; max-width: 100%; }
    .main mdui-card { margin-bottom: 24px; }
    .main .form-group textarea { width: 100%; min-height: 400px; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-header h1 { font-size: 28px; font-weight: 400; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card mdui-card { padding: 24px; }
    .stat-card .stat-number { font-size: 36px; font-weight: 500; color: rgb(var(--mdui-color-primary)); }
    .stat-card .stat-label { font-size: 14px; color: rgb(var(--mdui-color-outline)); margin-top: 4px; }
    .post-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid rgb(var(--mdui-color-outline-variant)); }
    .post-item:last-child { border-bottom: none; }
    .post-info h3 { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
    .post-info span { font-size: 13px; color: rgb(var(--mdui-color-outline)); }
    .post-actions { display: flex; gap: 8px; }
    .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-card { width: 400px; padding: 32px; }
    .login-card h1 { font-size: 24px; font-weight: 500; margin-bottom: 24px; text-align: center; }
    .login-card mdui-text-field { width: 100%; margin-bottom: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 4px; color: rgb(var(--mdui-color-on-surface)); }
    .form-group input, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid rgb(var(--mdui-color-outline)); border-radius: 8px; font-size: 14px; font-family: inherit; background: rgb(var(--mdui-color-surface)); color: rgb(var(--mdui-color-on-surface)); }
    .form-group textarea { min-height: 300px; resize: vertical; font-family: 'Fira Code', 'Monaco', monospace; font-size: 13px; line-height: 1.5; }
    .tag-input { display: flex; flex-wrap: wrap; gap: 4px; padding: 8px; border: 1px solid rgb(var(--mdui-color-outline)); border-radius: 8px; min-height: 42px; }
    .tag-input input { border: none; outline: none; flex: 1; min-width: 80px; font-size: 14px; background: transparent; color: rgb(var(--mdui-color-on-surface)); }
    .tag-input .tag { display: inline-flex; align-items: center; gap: 4px; background: rgb(var(--mdui-color-secondary-container)); color: rgb(var(--mdui-color-on-secondary-container)); padding: 2px 8px; border-radius: 12px; font-size: 13px; }
    .tag-input .tag .remove { cursor: pointer; font-size: 16px; line-height: 1; }
    .hidden { display: none !important; }
    .comment-item { padding: 12px 0; border-bottom: 1px solid rgb(var(--mdui-color-outline-variant)); font-size: 14px; display: flex; justify-content: space-between; align-items: flex-start; }
    .comment-item .comment-info { flex: 1; }
    .comment-item .comment-text { margin: 4px 0; }
    .comment-item .comment-meta { font-size: 12px; color: rgb(var(--mdui-color-outline)); }
    .editor-toolbar { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .editor-toolbar mdui-button-icon { --mdui-button-icon-size: 36px; }
    #toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // ===== Blog Material You — Admin Panel (SSR-Powered) =====
    const API = '/api/admin';
    const SSR = '/api/admin/ssr';
    let authToken = null;
    let currentView = 'dashboard';

    // ===== Utils =====
    function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function toast(msg) {
      const el = document.getElementById('toast') || (() => { const e = document.createElement('div'); e.id = 'toast'; document.body.appendChild(e); return e; })();
      el.innerHTML = '<mdui-snackbar>' + escapeHtml(msg) + '</mdui-snackbar>';
      const sb = el.querySelector('mdui-snackbar');
      if (sb) sb.show = true;
    }

    async function api(path, opts) {
      const headers = { 'Content-Type': 'application/json' };
      const res = await fetch(API + path, { ...opts, headers: { ...headers, ...(opts?.headers || {}) }, credentials: 'same-origin' });
      if (res.status === 401) { authToken = null; render(); throw new Error('Unauthorized'); }
      return res.json();
    }

    async function fetchSSR(path) {
      const res = await fetch(SSR + path);
      if (!res.ok) return '<p style="color:red">Failed to load: ' + res.status + '</p>';
      return res.text();
    }

    // ===== Auth (Password + optional TOTP 2FA) =====
    let loginStep = 1;
    let loginTempToken = null;

    function resetLogin() {
      loginStep = 1;
      loginTempToken = null;
      render();
    }

    async function doLogin(username, password) {
      var errEl = document.getElementById('login-error');
      if (!username || !password) {
        if (errEl) { errEl.textContent = '请输入用户名和密码'; errEl.style.display = ''; }
        return;
      }
      if (errEl) errEl.style.display = 'none';
      const res = await fetch(API + '/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      var data;
      try { data = await res.json(); } catch(e) { data = { errno: -1, errmsg: '服务器返回格式错误' }; }
      if (data.errno !== 0) {
        if (errEl) { errEl.textContent = data.errmsg || '登录失败'; errEl.style.display = ''; }
        else toast('登录失败：' + (data.errmsg || '未知错误'));
        return;
      }
      if (data.data && data.data.step === 2) {
        loginStep = 2;
        loginTempToken = data.data.temp_token;
        const app = document.getElementById('app');
        app.innerHTML = await fetchSSR('/login-totp');
        bindLoginEvents();
        return;
      }
      if (data.data && data.data.token) {
        authToken = data.data.token;
        loginStep = 1;
        loginTempToken = null;
        render();
      }
    }

    async function doTotpLogin(totpCode) {
      const res = await fetch(API + '/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ step: 2, temp_token: loginTempToken, totp: totpCode })
      });
      const data = await res.json();
      if (data.errno === 0 && data.data) {
        authToken = data.data.token;
        loginStep = 1;
        loginTempToken = null;
        toast('登录成功 ✓');
        render();
      } else {
        toast('验证失败：' + (data.errmsg || '验证码错误'));
      }
    }

    function logout() {
      authToken = null;
      fetch(API + '/logout', { method: 'POST', credentials: 'same-origin' }).catch(function(){});
      render();
    }

    // ===== View Loading =====
    async function render() {
      const app = document.getElementById('app');
      if (!authToken) {
        fetch(API + '/posts', { credentials: 'same-origin' }).then(function(r) {
          if (r.ok) {
            authToken = 'cookie';
            loadLayout();
            return;
          }
          fetch(API + '/setup').then(function(r2) { return r2.json(); }).then(function(d) {
            if (d.errno === 0 && d.data && !d.data.setup_done) {
              app.innerHTML = '';
              fetchSSR('/setup').then(function(html) {
                app.innerHTML = html;
                bindEventListeners();
              });
            } else {
              fetchSSR('/login').then(function(html) {
                app.innerHTML = html;
                bindEventListeners();
              });
            }
          }).catch(function() {
            fetchSSR('/login').then(function(html) {
              app.innerHTML = html;
              bindEventListeners();
            });
          });
        }).catch(function() {
          fetchSSR('/login').then(function(html) {
            app.innerHTML = html;
            bindEventListeners();
          });
        });
        return;
      }
      loadLayout();
    }

    async function loadLayout() {
      const app = document.getElementById('app');
      app.innerHTML = await fetchSSR('/layout');
      // Bind nav click
      document.querySelectorAll('.nav-item').forEach(function(item) {
        item.addEventListener('click', function(e) {
          e.preventDefault();
          currentView = this.dataset.view;
          renderContent();
          document.querySelectorAll('.nav-item').forEach(function(n) { n.active = false; });
          this.active = true;
        }, true);
      });
      document.getElementById('logout-btn')?.addEventListener('click', logout, true);
      renderContent();
    }

    async function renderContent() {
      const el = document.getElementById('main-content');
      if (!el) return;
      el.innerHTML = '加载中...';
      try {
        var path = '/' + currentView;
        if (currentView === 'dashboard') path = '/dashboard';
        else if (currentView === 'posts') path = '/posts';
        else if (currentView === 'comments') path = '/comments';
        else if (currentView === 'talks') path = '/talks';
        else if (currentView === 'friends') path = '/friends';
        else if (currentView === 'pages') path = '/pages';
        else if (currentView === 'security') path = '/security';
        el.innerHTML = await fetchSSR(path);
        bindEventListeners();
        // Start auto-refresh for security page (TOTP secret/QR code)
        if (currentView === 'security') startSecurityRefresh(); else stopSecurityRefresh();
      } catch(e) {
        el.innerHTML = '<p style="color:red">加载失败: ' + escapeHtml(e.message) + '</p>';
      }
    }

    function bindEventListeners() {
      document.querySelectorAll('[data-action]').forEach(function(el) {
        el.addEventListener('click', function(e) {
          const target = e.currentTarget;
          const action = target.dataset.action;
          const args = target.dataset.args;
          if (action === 'edit-post') editPost(args);
          else if (action === 'delete-post') deletePost(args);
          else if (action === 'delete-comment') deleteComment(args);
          else if (action === 'delete-talk') deleteTalk(args);
          else if (action === 'new-post') newPost();
          else if (action === 'new-talk') newTalk();
          else if (action === 'toggle-archive') toggleArchive(args);
          else if (action === 'edit-page') editPage(args);
          else if (action === 'delete-friend') deleteFriend(args);
          else if (action === 'new-friend') newFriend();
          else if (action === 'save-friend') saveFriend();
          else if (action === 'edit-friend') editFriend(args);
          else if (action === 'save-post') savePost();
          else if (action === 'save-page') savePage();
          else if (action === 'cancel-edit') renderContent();
          else if (action === 'totp-start') startTotpSetup();
          else if (action === 'totp-verify') verifyTotpSetup();
          else if (action === 'totp-cancel') cancelTotpSetup();
          else if (action === 'totp-disable') disableTotp();
          else if (action === 'totp-regenerate') regenerateTotp();
          else if (action === 'change-password') changePassword();
          else if (action === 'login') doLogin(
            document.getElementById('lf-user')?.value || '',
            document.getElementById('lf-pass')?.value || ''
          );
          else if (action === 'setup-init') doSetupInit();
        }, true);
      });
    }

    function bindLoginEvents() {
      if (loginStep === 2) {
        const form = document.getElementById('login-form-totp');
        if (form) {
          form.addEventListener('submit', function(e) {
            e.preventDefault();
            const totp = document.getElementById('lf-totp')?.value || '';
            if (!totp || totp.length !== 6) { toast('请输入6位验证码'); return; }
            doTotpLogin(totp);
          });
          const input = document.getElementById('lf-totp');
          if (input) {
            input.addEventListener('input', function(e) {
              if (e.target.value.length === 6) doTotpLogin(e.target.value);
            });
          }
        }
        return;
      }
      bindEventListeners();
    }

    // ===== Posts =====
    function newPost() {
      var el = document.getElementById('main-content');
      fetchSSR('/editor').then(function(html) {
        el.innerHTML = html;
        bindEventListeners();
        initEditorToolbar();
      });
    }

    async function editPost(slug) {
      var el = document.getElementById('main-content');
      el.innerHTML = await fetchSSR('/editor?slug=' + encodeURIComponent(slug || ''));
      bindEventListeners();
      initEditorToolbar();
    }

    function initEditorToolbar() {
      const ta = document.getElementById('ed-content');
      if (!ta) return;
      const tb = function(id, txt) {
        document.getElementById(id)?.addEventListener('click', function() { ta.value += txt; ta.focus(); });
      };
      tb('tb-bold', '**加粗**');
      tb('tb-italic', '*斜体*');
      tb('tb-heading', '\\n## 标题\\n');
      tb('tb-list', '\\n- 列表项\\n');
      tb('tb-code', '\\n```\\n代码\\n```\\n');
      tb('tb-quote', '\\n> 引用\\n');
    }

    async function deletePost(slug) {
      if (!confirm('确定删除 "' + slug + '"？')) return;
      const res = await api('/posts?slug=' + encodeURIComponent(slug), { method: 'DELETE' });
      if (res.errno === 0) { await api('/reload', { method: 'POST' }); toast('已删除'); renderContent(); }
      else toast('删除失败');
    }

    async function toggleArchive(slug) {
      const res = await api('/posts', { method: 'PATCH', body: JSON.stringify({ slug }) });
      if (res.errno === 0) { await api('/reload', { method: 'POST' }); toast('操作成功 ✓'); renderContent(); }
      else toast('操作失败: ' + (res.errmsg || ''));
    }

    async function savePost() {
      const slug = document.getElementById('ed-slug').value.trim();
      const title = document.getElementById('ed-title').value.trim();
      const date = document.getElementById('ed-date').value;
      const cover = document.getElementById('ed-cover').value.trim();
      const tags = document.getElementById('ed-tags').value.split(',').map(s => s.trim()).filter(Boolean);
      const categories = document.getElementById('ed-cats').value.split(',').map(s => s.trim()).filter(Boolean);
      const content = document.getElementById('ed-content').value;
      const titleEn = document.getElementById('ed-title-en').value.trim();
      const tagsEn = document.getElementById('ed-tags-en').value.split(',').map(s => s.trim()).filter(Boolean);
      const catsEn = document.getElementById('ed-cats-en').value.split(',').map(s => s.trim()).filter(Boolean);
      const contentEn = document.getElementById('ed-content-en').value;

      if (!slug || !title) { toast('Slug 和标题不能为空'); return; }

      var result = await api('/posts');
      var list = result.data;
      if (!Array.isArray(list)) list = [];
      var method = list.some(function(p) { return p.slug === slug; }) ? 'PUT' : 'POST';
      const res = await api('/posts', {
        method,
        body: JSON.stringify({ slug, title, date, tags, categories, cover, content, title_en: titleEn, tags_en: tagsEn, categories_en: catsEn, content_en: contentEn })
      });
      if (res.errno === 0) { await api('/reload', { method: 'POST' }); toast('保存成功 ✓'); renderContent(); }
      else toast('保存失败: ' + (res.errmsg || ''));
    }

    // ===== Comments =====
    async function deleteComment(id) {
      if (!confirm('确定删除这条评论？')) return;
      const res = await api('/comments?id=' + id, { method: 'DELETE' });
      if (res.errno === 0) { await api('/reload', { method: 'POST' }); toast('已删除'); renderContent(); }
      else toast('删除失败');
    }

    // ===== Talks =====
    function newTalk() {
      var el = document.getElementById('main-content');
      fetchSSR('/talks/new').then(function(html) { el.innerHTML = html; });
    }

    async function saveNewTalk() {
      const content = document.getElementById('talk-content').value.trim();
      if (!content) { toast('内容不能为空'); return; }
      const res = await api('/talks', { method: 'POST', body: JSON.stringify({ content }) });
      if (res.errno === 0) { await api('/reload', { method: 'POST' }); toast('已发布 ✓'); renderContent(); }
      else toast('发布失败');
    }

    async function deleteTalk(id) {
      if (!confirm('确定删除这条动态？')) return;
      const res = await api('/talks?id=' + id, { method: 'DELETE' });
      if (res.errno === 0) { await api('/reload', { method: 'POST' }); toast('已删除'); renderContent(); }
      else toast('删除失败');
    }

    // ===== Friends =====
    let _editingFriendId = null;

    function newFriend() {
      _editingFriendId = null;
      var el = document.getElementById('main-content');
      fetchSSR('/friends/editor').then(function(html) {
        el.innerHTML = html;
        bindEventListeners();
      });
    }

    function editFriend(data) {
      const f = typeof data === 'string' ? JSON.parse(data) : data;
      _editingFriendId = f.id;
      var el = document.getElementById('main-content');
      fetchSSR('/friends/editor?data=' + encodeURIComponent(data)).then(function(html) {
        el.innerHTML = html;
        bindEventListeners();
      });
    }

    async function saveFriend() {
      const title = document.getElementById('f-title').value.trim();
      const url = document.getElementById('f-url').value.trim();
      if (!title || !url) { toast('标题和URL不能为空'); return; }
      const body = {
        title, url,
        descr: document.getElementById('f-descr').value.trim(),
        title_en: document.getElementById('f-title-en').value.trim(),
        descr_en: document.getElementById('f-descr-en').value.trim(),
        avatar: document.getElementById('f-avatar').value.trim(),
        sort_order: parseInt(document.getElementById('f-sort').value) || 0
      };
      if (_editingFriendId) { body.id = _editingFriendId; await api('/friends', { method: 'PUT', body: JSON.stringify(body) }); }
      else { await api('/friends', { method: 'POST', body: JSON.stringify(body) }); }
      await api('/reload', { method: 'POST' });
      toast('已保存 ✓'); renderContent();
    }

    async function deleteFriend(id) {
      if (!confirm('确定删除这条友链？')) return;
      await api('/friends', { method: 'DELETE', body: JSON.stringify({ id: parseInt(id) }) });
      await api('/reload', { method: 'POST' });
      toast('已删除'); renderContent();
    }

    // ===== Pages =====
    function editPage(slug) {
      var el = document.getElementById('main-content');
      fetchSSR('/pages/editor?slug=' + encodeURIComponent(slug || 'about')).then(function(html) {
        el.innerHTML = html;
        bindEventListeners();
      });
    }

    async function savePage() {
      const slug = document.getElementById('ed-slug').value.trim();
      const title = document.getElementById('ed-title').value.trim();
      const content = document.getElementById('ed-content').value;
      const titleEn = document.getElementById('ed-title-en')?.value?.trim() || '';
      const contentEn = document.getElementById('ed-content-en')?.value || '';
      const res = await api('/pages', {
        method: 'PUT',
        body: JSON.stringify({ slug, title, content, title_en: titleEn, content_en: contentEn })
      });
      if (res.errno === 0) { await api('/reload', { method: 'POST' }); toast('页面已保存 ✓'); renderContent(); }
      else toast('保存失败');
    }

    // ===== Security =====
    let totpState = {};

    async function startTotpSetup() {
      const res = await api('/totp-setup', {
        method: 'POST',
        body: JSON.stringify({ action: 'start' })
      });
      if (res.errno === 0) {
        totpState = res.data;
        renderContent();
      } else {
        toast('操作失败: ' + (res.errmsg || ''));
      }
    }

    async function verifyTotpSetup() {
      const code = document.getElementById('totp-verify-code')?.value?.trim();
      if (!code || code.length !== 6) { toast('请输入6位验证码'); return; }
      const res = await api('/totp-setup', {
        method: 'POST',
        body: JSON.stringify({ action: 'verify', code })
      });
      if (res.errno === 0) { toast('✅ 两步验证已启用'); renderContent(); }
      else { toast('验证失败: ' + (res.errmsg || '验证码错误')); }
    }

    async function cancelTotpSetup() {
      await api('/totp-setup', { method: 'POST', body: JSON.stringify({ action: 'disable' }) });
      renderContent();
    }

    async function disableTotp() {
      if (!confirm('确定禁用两步验证？\n\n如果未保存密钥，再次启用时需要重新绑定所有设备。')) return;
      const res = await api('/totp-setup', { method: 'POST', body: JSON.stringify({ action: 'disable' }) });
      if (res.errno === 0) { toast('两步验证已禁用'); renderContent(); }
      else { toast('操作失败'); }
    }

    async function regenerateTotp() {
      const res = await api('/totp-setup', { method: 'POST', body: JSON.stringify({ action: 'start' }) });
      if (res.errno === 0) {
        // Update the page in-place without full reload
        var secretEl = document.getElementById('totp-secret');
        if (secretEl && res.data.secret) secretEl.value = res.data.secret;
        var qrEl = document.querySelector('[alt="TOTP QR Code"]');
        if (qrEl && res.data.provisioning_uri) {
          qrEl.src = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(res.data.provisioning_uri);
        }
        toast('密钥已重新生成 ✓');
      } else {
        toast('操作失败: ' + (res.errmsg || ''));
      }
    }

    async function changePassword() {
      var oldPass = document.getElementById('cp-old')?.value;
      var newUser = document.getElementById('cp-user')?.value?.trim();
      var newPass = document.getElementById('cp-new')?.value;
      var newPass2 = document.getElementById('cp-new2')?.value;
      var errEl = document.getElementById('cp-error');
      if (!oldPass) { errEl.textContent = '请输入当前密码'; return; }
      if (!newPass) { errEl.textContent = '请输入新密码'; return; }
      if (newPass.length < 6) { errEl.textContent = '新密码长度不少于6位'; return; }
      if (newPass !== newPass2) { errEl.textContent = '两次密码输入不一致'; return; }
      errEl.textContent = '保存中...';
      const res = await api('/setup', {
        method: 'POST',
        body: JSON.stringify({ action: 'change', old_password: oldPass, new_password: newPass, new_user: newUser })
      });
      if (res.errno === 0) { toast('✅ 密码已更改'); renderContent(); }
      else { errEl.textContent = res.errmsg || '更改失败'; }
    }

    async function doSetupInit() {
      var user = document.getElementById('su-user')?.value?.trim();
      var pass = document.getElementById('su-pass')?.value;
      var pass2 = document.getElementById('su-pass2')?.value;
      var errEl = document.getElementById('setup-error');
      if (!user || !pass) { errEl.textContent = '用户名和密码不能为空'; errEl.style.display = ''; return; }
      if (pass.length < 6) { errEl.textContent = '密码长度不少于6位'; errEl.style.display = ''; return; }
      if (pass !== pass2) { errEl.textContent = '两次密码输入不一致'; errEl.style.display = ''; return; }
      errEl.style.display = 'none';
      try {
        var res = await fetch(API + '/setup', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'init', user: user, password: pass })
        });
        var d = await res.json();
        if (d.errno === 0) {
          var warnEl = document.getElementById('setup-warning');
          if (warnEl) { warnEl.style.display = ''; warnEl.textContent = '⚠️ 初始化成功！建议立即修改密码。'; }
          setTimeout(function() { render(); }, 2000);
        } else {
          errEl.textContent = d.errmsg || '初始化失败';
          errEl.style.display = '';
        }
      } catch(e) {
        errEl.textContent = '网络错误: ' + e.message;
        errEl.style.display = '';
      }
    }

    // ===== Security Page Auto-Refresh (TOTP secret / QR code) =====
    let _securityRefreshTimer = null;

    function stopSecurityRefresh() {
      if (_securityRefreshTimer) {
        clearInterval(_securityRefreshTimer);
        _securityRefreshTimer = null;
      }
    }

    function startSecurityRefresh() {
      stopSecurityRefresh();
      _securityRefreshTimer = setInterval(async function() {
        var el = document.getElementById('totp-secret');
        if (!el) return;  // not on TOTP-enabled page
        try {
          var res = await api('/totp-setup', { method: 'GET' });
          if (res.errno === 0 && res.data) {
            // Update secret input
            var secretEl = document.getElementById('totp-secret');
            if (secretEl && res.data.secret) secretEl.value = res.data.secret;
            // Update QR code image
            var qrEl = document.querySelector('[alt="TOTP QR Code"]');
            if (qrEl && res.data.provisioning_uri) {
              var newSrc = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(res.data.provisioning_uri);
              if (qrEl.src !== newSrc) qrEl.src = newSrc;
            }
          }
        } catch(e) { /* silently retry on next interval */ }
      }, 30000);
    }

    // ===== Init =====
    render();
  </script>
</body>
</html>
