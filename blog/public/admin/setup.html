<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>初始化 · 博客管理</title>
  <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
  <script src="https://unpkg.com/mdui@2/mdui.global.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Google Sans', sans-serif; background: #f5f5f5; min-height: 100vh; }
    .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-card { width: 400px; padding: 32px; }
    .login-card h1 { font-size: 24px; font-weight: 500; margin-bottom: 24px; text-align: center; }
    .login-card mdui-text-field { width: 100%; margin-bottom: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 4px; color: rgb(var(--mdui-color-on-surface)); }
    .form-group input { width: 100%; padding: 10px 12px; border: 1px solid rgb(var(--mdui-color-outline)); border-radius: 8px; font-size: 14px; font-family: inherit; background: rgb(var(--mdui-color-surface)); color: rgb(var(--mdui-color-on-surface)); }
    #setup-error { color: rgb(var(--mdui-color-error)); font-size: 14px; margin-bottom: 12px; }
    #setup-warning { color: rgb(var(--mdui-color-warning)); font-size: 14px; margin-bottom: 12px; }
    #toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const API = '/api/admin';
    const SSR = '/api/admin/ssr';

    function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function toast(msg) {
      const el = document.getElementById('toast') || (() => { const e = document.createElement('div'); e.id = 'toast'; document.body.appendChild(e); return e; })();
      el.innerHTML = '<mdui-snackbar>' + escapeHtml(msg) + '</mdui-snackbar>';
      const sb = el.querySelector('mdui-snackbar');
      if (sb) sb.show = true;
    }

    async function api(path, opts) {
      const headers = { 'Content-Type': 'application/json' };
      const res = await fetch(API + path, { ...opts, headers: { ...headers, ...(opts?.headers || {}) }, credentials: 'same-origin' });
      if (res.status === 401) { window.location.href = 'login.html'; throw new Error('Unauthorized'); }
      return res.json();
    }

    async function fetchSSR(path) {
      const res = await fetch(SSR + path);
      if (!res.ok) return '<p style="color:red">Failed to load: ' + res.status + '</p>';
      return res.text();
    }

    async function doSetupInit() {
      var user = document.getElementById('su-user')?.value?.trim();
      var pass = document.getElementById('su-pass')?.value;
      var pass2 = document.getElementById('su-pass2')?.value;
      var errEl = document.getElementById('setup-error');
      if (!user || !pass) { errEl.textContent = '用户名和密码不能为空'; errEl.style.display = ''; return; }
      if (pass.length < 6) { errEl.textContent = '密码长度不少于6位'; errEl.style.display = ''; return; }
      if (pass !== pass2) { errEl.textContent = '两次密码输入不一致'; errEl.style.display = ''; return; }
      errEl.style.display = 'none';
      try {
        var res = await fetch(API + '/setup', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'init', user: user, password: pass })
        });
        var d = await res.json();
        if (d.errno === 0) {
          var warnEl = document.getElementById('setup-warning');
          if (warnEl) { warnEl.style.display = ''; warnEl.textContent = '⚠️ 初始化成功！建议立即修改密码。'; }
          setTimeout(function() { window.location.href = 'login.html'; }, 2000);
        } else {
          errEl.textContent = d.errmsg || '初始化失败';
          errEl.style.display = '';
        }
      } catch(e) {
        errEl.textContent = '网络错误: ' + e.message;
        errEl.style.display = '';
      }
    }

    function bindEvents() {
      document.querySelectorAll('[data-action]').forEach(function(el) {
        el.addEventListener('click', function(e) {
          const target = e.currentTarget;
          const action = target.dataset.action;
          if (action === 'setup-init') doSetupInit();
        });
      });
    }

    document.addEventListener('DOMContentLoaded', async function() {
      // Check if already set up
      try {
        const d = await fetch(API + '/setup').then(r => r.json());
        if (d.errno === 0 && d.data && d.data.setup_done) {
          window.location.href = 'login.html';
          return;
        }
      } catch(e) {}

      var app = document.getElementById('app');
      app.innerHTML = await fetchSSR('/setup');
      bindEvents();
    });
  </script>
</body>
</html>
