<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · 博客管理</title>
  <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
  <script src="https://unpkg.com/mdui@2/mdui.global.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Google Sans', sans-serif; background: #f5f5f5; min-height: 100vh; }
    .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-card { width: 400px; padding: 32px; }
    .login-card h1 { font-size: 24px; font-weight: 500; margin-bottom: 24px; text-align: center; }
    .login-card mdui-text-field { width: 100%; margin-bottom: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 4px; color: rgb(var(--mdui-color-on-surface)); }
    .form-group input { width: 100%; padding: 10px 12px; border: 1px solid rgb(var(--mdui-color-outline)); border-radius: 8px; font-size: 14px; font-family: inherit; background: rgb(var(--mdui-color-surface)); color: rgb(var(--mdui-color-on-surface)); }
    #login-error { color: rgb(var(--mdui-color-error)); font-size: 14px; margin-bottom: 12px; }
    #toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const API = '/api/admin';
    const SSR = '/api/admin/ssr';

    function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function toast(msg) {
      const el = document.getElementById('toast') || (() => { const e = document.createElement('div'); e.id = 'toast'; document.body.appendChild(e); return e; })();
      el.innerHTML = '<mdui-snackbar>' + escapeHtml(msg) + '</mdui-snackbar>';
      const sb = el.querySelector('mdui-snackbar');
      if (sb) sb.show = true;
    }

    async function api(path, opts) {
      const headers = { 'Content-Type': 'application/json' };
      const res = await fetch(API + path, { ...opts, headers: { ...headers, ...(opts?.headers || {}) }, credentials: 'same-origin' });
      if (res.status === 401) { window.location.href = 'login.html'; throw new Error('Unauthorized'); }
      return res.json();
    }

    async function fetchSSR(path) {
      const res = await fetch(SSR + path);
      if (!res.ok) return '<p style="color:red">Failed to load: ' + res.status + '</p>';
      return res.text();
    }

    async function doLogin(username, password) {
      var errEl = document.getElementById('login-error');
      if (!username || !password) {
        if (errEl) { errEl.textContent = '请输入用户名和密码'; errEl.style.display = ''; }
        return;
      }
      if (errEl) errEl.style.display = 'none';
      const res = await fetch(API + '/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      var data;
      try { data = await res.json(); } catch(e) { data = { errno: -1, errmsg: '服务器返回格式错误' }; }
      if (data.errno !== 0) {
        if (errEl) { errEl.textContent = data.errmsg || '登录失败'; errEl.style.display = ''; }
        else toast('登录失败：' + (data.errmsg || '未知错误'));
        return;
      }
      if (data.data && data.data.step === 2) {
        window.location.href = 'login-totp.html?token=' + encodeURIComponent(data.data.temp_token);
        return;
      }
      if (data.data && data.data.token) {
        window.location.href = 'dashboard.html';
      }
    }

    function bindEvents() {
      document.querySelectorAll('[data-action]').forEach(function(el) {
        el.addEventListener('click', function(e) {
          const target = e.currentTarget;
          const action = target.dataset.action;
          if (action === 'login') {
            doLogin(
              document.getElementById('lf-user')?.value || '',
              document.getElementById('lf-pass')?.value || ''
            );
          }
        });
      });
      // Also bind form submit
      document.getElementById('login-form')?.addEventListener('submit', function(e) {
        e.preventDefault();
        doLogin(
          document.getElementById('lf-user')?.value || '',
          document.getElementById('lf-pass')?.value || ''
        );
      });
    }

    document.addEventListener('DOMContentLoaded', async function() {
      // Check if already logged in
      try {
        const r = await fetch(API + '/posts', { credentials: 'same-origin' });
        if (r.ok) {
          window.location.href = 'dashboard.html';
          return;
        }
      } catch(e) {}

      // Check if setup is needed
      try {
        const d = await fetch(API + '/setup').then(r => r.json());
        if (d.errno === 0 && d.data && !d.data.setup_done) {
          window.location.href = 'setup.html';
          return;
        }
      } catch(e) {}

      // Load login SSR
      var app = document.getElementById('app');
      app.innerHTML = await fetchSSR('/login');
      bindEvents();
    });
  </script>
</body>
</html>
