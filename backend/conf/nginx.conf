# Blog Material You Backend — OpenResty Configuration
# Self-contained: no system config changes, uses a high port.
# Architecture: JSON API backend (OpenResty/Lua) + SPA frontend (static HTML/JS)

worker_processes 1;
daemon off;
error_log /home/openclaw/workspace/Blog/backend/logs/error.log notice;
pid       /home/openclaw/workspace/Blog/backend/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Self-contained temp paths (no system /tmp dependence)
    client_body_temp_path /home/openclaw/workspace/Blog/backend/tmp/body;
    proxy_temp_path       /home/openclaw/workspace/Blog/backend/tmp/proxy;
    fastcgi_temp_path     /home/openclaw/workspace/Blog/backend/tmp/fastcgi;
    uwsgi_temp_path       /home/openclaw/workspace/Blog/backend/tmp/uwsgi;
    scgi_temp_path        /home/openclaw/workspace/Blog/backend/tmp/scgi;

    # Lua search path
    lua_package_path "/home/openclaw/workspace/Blog/backend/lua/?.lua;/home/openclaw/workspace/Blog/backend/lua/lib/?.lua;/opt/openresty/lualib/?.lua;;";

    # Shared dicts for cached blog data (preloaded at startup)
    lua_shared_dict blog_posts    2m;
    lua_shared_dict blog_pages    512k;
    lua_shared_dict blog_config   128k;
    lua_shared_dict blog_cache    1m;

    # Initialize blog data at worker startup
    init_worker_by_lua_file /home/openclaw/workspace/Blog/backend/lua/init.lua;

    include /opt/openresty/nginx/conf/mime.types;
    default_type application/octet-stream;

    server {
        listen       30999;
        server_name  localhost;
        charset      utf-8;

        # ==================== FRONTEND ROOT ====================
        # SPA: all non-API, non-static paths serve index.html
        root  /home/openclaw/workspace/blog-material-you/public;
        index index.html;

        # ==================== STATIC ASSETS ====================
        location ~* \.(css|js|svg|png|ico)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            # root is inherited from the server block
        }

        # ==================== API ENDPOINTS ====================

        location = /api/health {
            default_type application/json;
            return 200 '{"status":"ok","server":"openresty","version":"blog-material-you"}';
        }

        location = /api/config {
            content_by_lua_file /home/openclaw/workspace/Blog/backend/lua/api/config.lua;
        }

        location = /api/posts {
            content_by_lua_file /home/openclaw/workspace/Blog/backend/lua/api/posts.lua;
        }

        location ~ ^/api/posts/([^/]+)$ {
            set $post_slug $1;
            content_by_lua_file /home/openclaw/workspace/Blog/backend/lua/api/post.lua;
        }

        location = /api/tags {
            content_by_lua_file /home/openclaw/workspace/Blog/backend/lua/api/tags.lua;
        }

        location ~ ^/api/tags/([^/]+)$ {
            set $tag_name $1;
            content_by_lua_file /home/openclaw/workspace/Blog/backend/lua/api/tag.lua;
        }

        location = /api/categories {
            content_by_lua_file /home/openclaw/workspace/Blog/backend/lua/api/categories.lua;
        }

        location ~ ^/api/categories/([^/]+)$ {
            set $category_name $1;
            content_by_lua_file /home/openclaw/workspace/Blog/backend/lua/api/category.lua;
        }

        location = /api/archives {
            content_by_lua_file /home/openclaw/workspace/Blog/backend/lua/api/archives.lua;
        }

        location ~ ^/api/pages/([^/]+)$ {
            set $page_slug $1;
            content_by_lua_file /home/openclaw/workspace/Blog/backend/lua/api/page.lua;
        }

        location = /api/comments {
            content_by_lua_file /home/openclaw/workspace/Blog/backend/lua/api/comments.lua;
        }

        location = /api/talks {
            content_by_lua_file /home/openclaw/workspace/Blog/backend/lua/api/talks.lua;
        }

        # ==================== ADMIN API ====================

        location = /api/admin/login {
            content_by_lua_file /home/openclaw/workspace/Blog/backend/lua/api/admin/login.lua;
        }

        location = /api/admin/posts {
            content_by_lua_file /home/openclaw/workspace/Blog/backend/lua/api/admin/posts.lua;
        }

        location = /api/admin/comments {
            content_by_lua_file /home/openclaw/workspace/Blog/backend/lua/api/admin/comments.lua;
        }

        location = /api/admin/talks {
            content_by_lua_file /home/openclaw/workspace/Blog/backend/lua/api/admin/talks.lua;
        }

        location = /api/admin/pages {
            content_by_lua_file /home/openclaw/workspace/Blog/backend/lua/api/admin/pages.lua;
        }

        # ==================== ADMIN FRONTEND ====================
        location /admin/ {
            alias /home/openclaw/workspace/blog-material-you/public/admin/;
            index index.html;
        }

        location = /admin {
            return 302 /admin/;
        }

        # ==================== SPA FALLBACK ====================
        # All other paths serve index.html (client-side routing)
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
