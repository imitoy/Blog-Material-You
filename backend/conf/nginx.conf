# Blog Material You Backend — OpenResty Configuration (minimal)
# Site configs are in conf/sites-available/, enabled via conf/sites-enabled/.
# All paths are relative to the server prefix (-p "$SCRIPT_DIR").
# BMY_BLOG_DIR can override the blog content path (default: ../blog).

worker_processes 1;
error_log logs/error.log notice;
pid       nginx.pid;
env BMY_SESSION_SECRET;
env BMY_BLOG_DIR;
env BMY_DB_SOCKET;

events {
    worker_connections 1024;
}

http {
    # Self-contained temp paths (no system /tmp dependence)
    client_body_temp_path tmp/body;
    proxy_temp_path       tmp/proxy;
    fastcgi_temp_path     tmp/fastcgi;
    uwsgi_temp_path       tmp/uwsgi;
    scgi_temp_path        tmp/scgi;

    # Lua search path
    lua_package_path "/opt/openresty/lualib/?.lua;;";

    # Bootstrap package.path relative to server prefix for all Lua modules
    init_by_lua_block {
        local prefix = ngx.config.prefix()
        package.path = prefix .. "lua/?.lua;" .. prefix .. "lua/lib/?.lua;" .. package.path
    }

    # Shared dicts for cached blog data (preloaded at startup)
    lua_shared_dict blog_posts    2m;
    lua_shared_dict blog_pages    512k;
    lua_shared_dict blog_config   128k;
    lua_shared_dict blog_cache    1m;
    lua_shared_dict blog_sessions 1m;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=admin_login:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=admin_api:10m rate=60r/m;

    # Initialize blog data at worker startup
    init_worker_by_lua_file lua/init.lua;

    include /opt/openresty/nginx/conf/mime.types;
    default_type application/octet-stream;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: https://res.imitoy.top; connect-src 'self'; font-src 'self' https://unpkg.com;" always;

    # Enable site configs
    include sites-enabled/*.conf;
}
