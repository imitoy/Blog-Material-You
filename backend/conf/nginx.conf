# Blog Material You Backend — OpenResty Configuration
# Self-contained: no system config changes, uses high ports.
# Architecture:
#   Port 30999 — Public blog (SPA frontend + public API)
#   Port 31000 — Admin backend (admin API + admin frontend)
# All paths are relative to the server prefix (-p "$SCRIPT_DIR").

worker_processes 1;
error_log logs/error.log notice;
pid       nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Self-contained temp paths (no system /tmp dependence)
    client_body_temp_path tmp/body;
    proxy_temp_path       tmp/proxy;
    fastcgi_temp_path     tmp/fastcgi;
    uwsgi_temp_path       tmp/uwsgi;
    scgi_temp_path        tmp/scgi;

    # Lua search path
    lua_package_path "/opt/openresty/lualib/?.lua;;";

    # Bootstrap package.path relative to server prefix for all Lua modules
    init_by_lua_block {
        local prefix = ngx.config.prefix()
        package.path = prefix .. "lua/?.lua;" .. prefix .. "lua/lib/?.lua;" .. package.path
    }

    # Shared dicts for cached blog data (preloaded at startup)
    lua_shared_dict blog_posts    2m;
    lua_shared_dict blog_pages    512k;
    lua_shared_dict blog_config   128k;
    lua_shared_dict blog_cache    1m;
    lua_shared_dict blog_sessions 1m;

    # Rate limiting for admin login (M-03: 3 requests per minute per IP)
    limit_req_zone $binary_remote_addr zone=admin_login:10m rate=3r/m;
    limit_req_zone $binary_remote_addr zone=admin_api:10m rate=30r/m;

    # Initialize blog data at worker startup
    init_worker_by_lua_file lua/init.lua;

    include /opt/openresty/nginx/conf/mime.types;
    default_type application/octet-stream;

    # ==================== Security headers (L-02) ====================
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ==================== PUBLIC BLOG (Port 30999) ====================
    server {
        listen       30999;
        server_name  localhost;
        charset      utf-8;

        # Frontend root (SPA)
        root  ../blog/public;
        index index.html;

        # Static assets with caching
        location ~* \.(css|js|svg|png|ico)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ==================== PUBLIC API ====================
        location = /api/health {
            default_type application/json;
            return 200 '{"status":"ok","server":"openresty","version":"blog-material-you"}';
        }

        location = /api/config {
            content_by_lua_file lua/api/config.lua;
        }

        location = /api/posts {
            content_by_lua_file lua/api/posts.lua;
        }

        location ~ ^/api/posts/([^/]+)$ {
            set $post_slug $1;
            content_by_lua_file lua/api/post.lua;
        }

        location = /api/tags {
            content_by_lua_file lua/api/tags.lua;
        }

        location ~ ^/api/tags/([^/]+)$ {
            set $tag_name $1;
            content_by_lua_file lua/api/tag.lua;
        }

        location = /api/categories {
            content_by_lua_file lua/api/categories.lua;
        }

        location ~ ^/api/categories/([^/]+)$ {
            set $category_name $1;
            content_by_lua_file lua/api/category.lua;
        }

        location = /api/archives {
            content_by_lua_file lua/api/archives.lua;
        }

        location ~ ^/api/pages/([^/]+)$ {
            set $page_slug $1;
            content_by_lua_file lua/api/page.lua;
        }

        location = /api/comments {
            content_by_lua_file lua/api/comments.lua;
        }

        location = /api/talks {
            content_by_lua_file lua/api/talks.lua;
        }

        # ==================== SPA FALLBACK ====================
        # Redirect /admin/* to port 31000 (admin backend)
        location /admin {
            return 302 http://localhost:31000/;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # ==================== ADMIN BACKEND (Port 31000) ====================
    server {
        listen       31000;
        server_name  localhost;
        charset      utf-8;

        # M-06: Restrict admin port to localhost only
        allow 127.0.0.1;
        allow ::1;
        deny all;

        # ==================== ADMIN API ====================
        location = /api/admin/login {
            limit_req zone=admin_login burst=1 nodelay;
            content_by_lua_file lua/api/admin/login.lua;
        }

        location = /api/admin/setup {
            # Setup is only usable when NOT set up, rate limit still applies
            limit_req zone=admin_login burst=2 nodelay;
            content_by_lua_file lua/api/admin/setup.lua;
        }

        location = /api/admin/posts {
            limit_req zone=admin_api burst=5 nodelay;
            content_by_lua_file lua/api/admin/posts.lua;
        }

        location = /api/admin/comments {
            content_by_lua_file lua/api/admin/comments.lua;
        }

        location = /api/admin/talks {
            content_by_lua_file lua/api/admin/talks.lua;
        }

        location = /api/admin/pages {
            content_by_lua_file lua/api/admin/pages.lua;
        }

        location = /api/admin/totp-setup {
            content_by_lua_file lua/api/admin/totp_setup.lua;
        }

        location = /api/admin/imghost {
            content_by_lua_file lua/api/admin/imghost.lua;
        }

        # ==================== ADMIN FRONTEND ====================
        # Serve admin SPA at root (http://localhost:31000/)
        location / {
            root  ../blog/public/admin/;
            index index.html;
            try_files $uri /index.html;
        }
    }
}
