services:
  blog:
    build: .
    container_name: blog-material-you
    ports:
      - "30999:30999"
      - "31000:31000"
    environment:
      - BMY_BLOG_DIR=/app/blog
      - BMY_DB_SOCKET=/app/data/mysql/mysql.sock
    volumes:
      # Persist MariaDB data
      - blog_data:/app/data/mysql
      # Persist admin credentials and runtime data
      - blog_data_etc:/app/blog/data
      # Mount posts/pages for easy editing from host
      - ./blog/posts:/app/blog/posts
      - ./blog/pages:/app/blog/pages
    restart: unless-stopped

volumes:
  blog_data:
  blog_data_etc:
